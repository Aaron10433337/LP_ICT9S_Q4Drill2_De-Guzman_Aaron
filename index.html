<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Activity</title>
</head>
<body>
<h1>Savings Tracker</h1>
<h2>FOR Loop fixed number of weeks</h2>
<button onclick="forLoopSaving()"> Start FOR Loop</button>
<div id="forResult"></div>

<h2> WHILE Loop SAVE until Goal</h2>
<button onclick="whileLoopSaving()"> Start WHILE Loop</button>
<div id="whileResult"></div>

<h2> Do While Save At Least Once</h2>
<button onclick="dowhileLoopSavings()"> Stard DO While Loop</button>
<div id="dowhileResult"></div>

<script>

function forLoopSaving() {

    let weeklySave = 1000;
    let total = 0
    let output ="";

    for (let week= 1; week <=4; week++){
        total += weeklySave;
        output += "<p> Week " + "Total Saving = Php" + total + "</p>"
    }
    document.getElementById("forResult").innerHTML = output;
}

function whileLoopSaving(){
    let weeklySave = 1000;
    let total = 0;
    let goal = 10000;
    let week = 1;
    let output = "";

    while (total<goal){
        total += weeklySave;
        output += "<p> Week " + week + " Total Savings = Php" + total + "</p>"
         week++;
    }
    output+= "<b> GOAL REACHED! </b>"
    document.getElementById("whileResult").innerHTML = output;

}
function doWhileLoopSaving(){
    let weeklySave = 2000;
    let total = 0;
    let goal = 20000;
    let week = 1;
    let output = "";

    do {
        total += weeklySave;
        output += "<p> Week " + week + " Total Savings = Php" + total + "</p>"
         week++;
    } while (total<goal);

    output += "<b> Goal reached! </b>"
    document.getElementById("dowhileResult").innerHTML = output;


}

</script>
</body>
</html>
